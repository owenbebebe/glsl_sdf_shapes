<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GLSL Playground</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="top">
  <canvas id="c" width="500" height="500"></canvas>
  <button id="toggle-editor" title="Toggle editor">◀</button>

  <div id="editor-panel">
    <div id="editor-header">
      <span>fragment shader</span>
      <button id="run-btn" title="Ctrl+Enter">▶ Run</button>
    </div>
    <textarea id="shader-editor" spellcheck="false"></textarea>
    <div id="status-bar" class="ok">✓ compiled</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/glslCanvas@0.2.6/dist/GlslCanvas.js"></script>
<script src="shader.js"></script>
</body>
</html>
