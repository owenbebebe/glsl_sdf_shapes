<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GLSL Playground</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="top">
  <canvas id="c"></canvas>

  <div id="editor-panel">
    <div id="editor-header">
      <span>fragment shader</span>
      <button id="run-btn" title="Ctrl+Enter">▶ Run</button>
    </div>
    <textarea id="shader-editor" spellcheck="false"></textarea>
    <div id="status-bar" class="ok">✓ compiled</div>
  </div>
</div>

<!-- ── Hidden shader sources ─────────────────────────────────────── -->

<script id="vs" type="x-shader/x-vertex">#version 300 es
in vec2 a_position;
void main() {
  gl_Position = vec4(a_position, 0.0, 1.0);
}
</script>

<!-- Default starter shader (Shadertoy-style mainImage signature) -->
<script id="fs-default" type="x-shader/x-fragment">
void mainImage(out vec4 fragColor, in vec2 fragCoord) {
  vec2 uv = fragCoord / u_resolution;

  // Animated rainbow gradient
  vec3 col = 0.5 + 0.5 * cos(u_time + uv.xyx + vec3(0.0, 2.0, 4.0));

  fragColor = vec4(col, 1.0);
}
</script>

<script src="shader.js"></script>
</body>
</html>
